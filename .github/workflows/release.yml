name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: clashcontrol-engine-linux
          - os: macos-latest
            artifact: clashcontrol-engine-mac
          - os: windows-latest
            artifact: clashcontrol-engine-win.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .

      - name: Build executable
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact }} --strip --noupx src/clashcontrol_engine/__main__.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
