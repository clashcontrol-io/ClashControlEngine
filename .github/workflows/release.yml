name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: clashcontrol-engine-linux
          - os: macos-latest
            artifact: clashcontrol-engine-mac
          - os: windows-latest
            artifact: clashcontrol-engine-win.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install ".[fast]"

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        # --noconsole produces a GUI-subsystem binary: no cmd window
        # appears when the URL scheme handler fires, and no console
        # flashes when a user double-clicks the installer from
        # Explorer. _bootstrap.configure_io() rescues --foreground /
        # --status / --help output by AttachConsole-ing to the parent
        # cmd.exe when invoked from a terminal, and falls back to a
        # silent sink + MessageBox surface for the double-click case.
        run: |
          pyinstaller --onefile --noconsole --name ${{ matrix.artifact }} --noupx --bootloader-ignore-signals --hidden-import websockets --hidden-import scipy.spatial --collect-submodules scipy src/clashcontrol_engine/__main__.py

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact }} --noupx --bootloader-ignore-signals --strip --hidden-import websockets --hidden-import scipy.spatial --collect-submodules scipy src/clashcontrol_engine/__main__.py

      - name: Exclude Windows exe from Defender scanning
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}\dist"

      - name: Smoke test (non-Windows)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/${{ matrix.artifact }}
          timeout 5 dist/${{ matrix.artifact }} --help || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          dist\${{ matrix.artifact }} --help || exit 0

      - name: Package non-Windows binary as tarball
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload Windows release asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}

      - name: Upload non-Windows release asset
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}.tar.gz
