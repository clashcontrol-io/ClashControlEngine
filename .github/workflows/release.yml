name: Build & Release

# Runs on tag push for manually-created tags, via workflow_dispatch for
# re-runs, and — critically — via workflow_call from auto-release.yml.
# Auto-release creates its tags with the default GITHUB_TOKEN, and GitHub
# blocks token-created events from triggering other workflows, so the tag
# push alone would never start this build (releases shipped with no
# binaries). auto-release therefore calls this workflow directly in the
# same run, passing the tag as an input.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to build assets for (e.g. v0.3.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to build assets for"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: clashcontrol-engine-linux
          - os: macos-latest
            artifact: clashcontrol-engine-mac
          - os: windows-latest
            artifact: clashcontrol-engine-win.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # When called from auto-release, build the tagged commit (the
          # version-bump commit), not the commit that triggered the run.
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install ".[fast]"

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        # --noconsole produces a GUI-subsystem binary: no cmd window
        # appears when the URL scheme handler fires, and no console
        # flashes when a user double-clicks the installer from
        # Explorer. _bootstrap.configure_io() rescues --foreground /
        # --status / --help output by AttachConsole-ing to the parent
        # cmd.exe when invoked from a terminal, and falls back to a
        # silent sink + MessageBox surface for the double-click case.
        run: |
          pyinstaller --onefile --noconsole --name ${{ matrix.artifact }} --noupx --bootloader-ignore-signals --hidden-import websockets --hidden-import scipy.spatial --collect-submodules scipy src/clashcontrol_engine/__main__.py

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact }} --noupx --bootloader-ignore-signals --strip --hidden-import websockets --hidden-import scipy.spatial --collect-submodules scipy src/clashcontrol_engine/__main__.py

      - name: Exclude Windows exe from Defender scanning
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}\dist"

      - name: Smoke test (non-Windows)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/${{ matrix.artifact }}
          timeout 5 dist/${{ matrix.artifact }} --help || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          dist\${{ matrix.artifact }} --help || exit 0

      - name: Package non-Windows binary as tarball
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload Windows release asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: dist/${{ matrix.artifact }}

      - name: Upload non-Windows release asset
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: dist/${{ matrix.artifact }}.tar.gz

  # Generate SHA256SUMS over every asset attached above and add it to the
  # release. The self-updater downloads this file and verifies the binary
  # hash before swapping it in.
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          mkdir assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir assets
          cd assets
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
          gh release upload "$TAG" SHA256SUMS --clobber --repo "$GITHUB_REPOSITORY"
